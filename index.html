<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <!-- Подключаем иконки Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a26;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-glow: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Эффект свечения на заднем плане */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #7f00ff, #00f0ff);
            filter: blur(120px);
            opacity: 0.2;
            z-index: 0;
            top: 20%;
        }

        /* Основной контейнер-карточка */
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 380px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease-out;
        }
 
        /* Стильный градиентный аватар */
        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
        }

        .avatar-glow {
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: var(--accent-glow);
            border-radius: 50%;
            z-index: -1;
            filter: blur(4px);
        }

.avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--card-bg);
            /* Свойства ниже центрируют и красиво обрезают любое фото */
            object-fit: cover;
            object-position: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .username {
            color: #00f0ff;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            display: inline-block;
            letter-spacing: 1px;
        }

        /* Список ссылок */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 16px;
            font-weight: 500;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Иконка внутри кнопки */
        .link-item i {
            font-size: 20px;
            width: 30px;
            text-align: left;
            transition: transform 0.25s ease;
        }

        .link-item span {
            flex-grow: 1;
            text-align: left;
            margin-left: 10px;
        }

        /* Стрелка справа */
        .link-item .arrow {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0;
            transform: translateX(-5px);
            transition: all 0.25s ease;
        }

        /* Эффекты при наведении */
        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .link-item:hover i {
            transform: scale(1.1);
            color: #00f0ff;
        }

        .link-item:hover .arrow {
            opacity: 1;
            transform: translateX(0);
            color: #00f0ff;
        }

        /* Анимация появления сайта */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
<!-- Аватар с неоновым контуром и фото -->
        <div class="avatar-container">
            <div class="avatar-glow"></div>
            <img src="./8b25a2aa-c25a-4215-921e-5b2e111c55ae.jpg" alt="NUR" class="avatar">
        </div> 
        
        <h1>TIK TOK</h1>
        <span class="username">@nurdesigner01</span>

        <!-- Кнопки социальных сетей -->
        <div class="links-list">
            
            <a href="https://t.me/desnur" target="_blank" class="link-item">
                <i class="fab fa-telegram"></i>
                <span>Telegram channel</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://t.me/koichaibratishka" target="_blank" class="link-item">
                <i class="fab fa-telegram"></i>
                <span>Telegram chat</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://www.tiktok.com/@nurdesigner01" target="_blank" class="link-item">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
            
            <a href="https://instagram.com/15nursultan_" target="_blank" class="link-item">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://youtube.com/" target="_blank" class="link-item">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

        </div>
    </div>

</body>
</html>
